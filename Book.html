<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Collection</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap');

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h2 {
            color: #2c3e50;
            font-size: 22px;
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 8px;
            margin-top: 30px;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: #7f8c8d;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
        }

        tr {
            border-bottom: 1px solid #eef2f5;
        }

        td.title {
            font-weight: 600;
            color: #1a252f;
        }

        td.price {
            font-weight: 700;
            color: #27ae60;
            text-align: right;
        }

        th.price-th {
            text-align: right;
        }

        /* Gallery Using Figure Elements */
        section.gallery {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        figure {
            margin: 0;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow: hidden;
            width: 150px;
        }

        figure img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        /* Review Blockquote Styling */
        blockquote {
            background-color: #ebf5fb;
            border-left: 5px solid #3498db;
            margin: 0;
            padding: 20px;
            border-radius: 4px;
        }

        blockquote p {
            margin: 0;
            font-style: italic;
            font-size: 16px;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<main>

    <h2>Books & Pricing</h2>
    <table>
        <thead>
            <tr>
                <th>Book Title</th>
                <th>Author / Creator</th>
                <th class="price-th">Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="title">Game of Thrones</td>
                <td>David Benioff and D.B. Weiss</td>
                <td class="price">$12</td>
            </tr>
            <tr>
                <td class="title">Spider-Man</td>
                <td>Stan Lee</td>
                <td class="price">$10</td>
            </tr>
            <tr>
                <td class="title">Java Programming</td>
                <td>Herbert Schildt</td>
                <td class="price">$20</td>
            </tr>
        </tbody>
    </table>

    <h2>Featured Covers</h2>
    <section class="gallery">
        <figure>
            <img src="https://images.unsplash.com/photo-1635805737707-575885ab0820?w=500&auto=format&fit=crop&q=60" alt="Spider-Man">
        </figure>
        <figure>
            <img src="https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=500&auto=format&fit=crop&q=60" alt="Game of Thrones">
        </figure>
    </section>

    <h2>Customer Reviews</h2>
    <blockquote>
        <p>"Excellent collection of books."</p>
    </blockquote>

</main>

</body>
</html>
